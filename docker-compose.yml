

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: tierce_postgres
    environment:
      POSTGRES_DB: tierce_voice
      POSTGRES_USER: tierce
      POSTGRES_PASSWORD: tierce
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tierce -d tierce_voice"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: tierce_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI) ───────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tierce_backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://tierce:tierce@postgres:5432/tierce_voice
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend
    command: sh ./backend/start.sh
    restart: unless-stopped

  # ── Frontend (Next.js) ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Must be a PUBLICLY reachable backend URL (not localhost) so the app
        # works from phones / dev tunnels. Baked into the client bundle at build
        # time, so rebuild the frontend after changing this.
        NEXT_PUBLIC_API_URL: https://intense-funeral-suitable-connector.trycloudflare.com
    container_name: tierce_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  # ── Cloudflare Tunnel (free, unlimited bandwidth — replaces ngrok) ───────────
  # Quick tunnel: exposes the backend at a random *.trycloudflare.com URL.
  # The URL changes whenever THIS container restarts — read it from the logs
  # (`docker compose logs cloudflared`) and update BASE_URL + the frontend build arg.
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: tierce_cloudflared
    command: tunnel --no-autoupdate --url http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
